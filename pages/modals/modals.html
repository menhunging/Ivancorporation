<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, viewport-fit=cover" />
    <title>Модальные окна</title>

    <link rel="icon" type="image/png" href="../../img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../../img/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../../img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../../img/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../../img/favicon/site.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Зона комфорта" />

    <link rel="stylesheet" type="text/css" href="../../fonts/stylesheet.css" />

    <link rel="stylesheet" type="text/css" href="../../libs/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" type="text/css" href="../../libs/selectric/selectric.css" />
    <link rel="stylesheet" type="text/css" href="../../libs/micromodal/micromodal.css" />
    <link rel="stylesheet" type="text/css" href="../../libs/fancybox/fancybox.css" />
    <link rel="stylesheet" type="text/css" href="../../css/style.css" />
</head>

<body class="market-page">

    <div class="site-wrapper">

        <main class="main">

            <div class="container">
                <br />
                <br />

                <a href="#" data-modal="popup-password">Введите пароль</a>

                <br />
                <br />

                <a href="#" data-modal="popup-fabric">Пример попапа фабрик</a>


            </div>
        </main>

    </div>

</body>

<div class="micromodal-slide modal" id="popup-password" aria-hidden="true">
    <div class="modal__overlay" tabindex="-1" data-micromodal-close></div>
    <div class="modal__container" role="dialog" aria-modal="true">
        <div class="modal__close" tabindex="-1" data-micromodal-close></div>
        <form class="modal__inner" action="" method="post">
            <div class="modal__content" autocomplete="off">
                <span class="modal__title caption caption--h3">Введите пароль</span>
                <p>
                    Эта ссылка защищена паролем. Свяжитесь с владельцем файла, чтобы узнать пароль.
                </p>

                <div class="input-item">
                    <input type="text" placeholder="Введите пароль" class="input-password">
                    <span class="error-message">*Неверный пароль</span>
                </div>

                <button class="btn btn--dark" disabled>Отправить</button>

            </div>
        </form>
    </div>
</div>

<div class="micromodal-slide modal" id="popup-fabric" aria-hidden="true">
    <div class="modal__overlay" tabindex="-1" data-micromodal-close></div>
    <div class="modal__container" role="dialog" aria-modal="true">
        <div class="modal__close" tabindex="-1" data-micromodal-close></div>
        <div class="modal__inner">
            <div class="modal__content">
                <div class="fabric-invis-block fabric-invis-block--modal">
                    <div class="fabric-invis-block__content">
                        <span class="fabric-invis-block__title">Kastel</span>
                        <span class="caption caption--h2">Стильные решения
                            для комфорта </span>
                        <a href="#" class="btn btn--dark btn--arrow">ПЕРЕЙТИ К КАТАЛОГАМ</a>
                    </div>

                    <div class="picture-block">
                        <picture>
                            <source type="image/webp" srcset="./../../img/pic-fabric-all-big.webp" />
                            <img src="./../../img/pic-fabric-all-big.jpg" alt="" />
                        </picture>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../../libs/jquery/jquery-3.7.1.min.js"></script>
<script src="../../libs/swiper/swiper-bundle.min.js"></script>
<script src="../../libs/selectric/jquery.selectric.min.js"></script>
<script src="../../libs/micromodal/micromodal.min.js"></script>
<script src="../../libs/tabslet/jquery.tabslet.min.js"></script>
<script src="../../libs/fancybox/fancybox.umd.js"></script>
<script src="../../libs/masonry/masonry.pkgd.min.js"></script>
<script src="../../js/main.js"></script>

</html>
